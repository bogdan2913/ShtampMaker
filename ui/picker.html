<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Поставить штамп</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        .picker-hint {
            font-size: 12px;
            color: #8e8e93;
            flex-shrink: 0;
        }
        .picker-footer {
            flex-shrink: 0;
            display: flex;
            justify-content: flex-end;
            padding-top: 10px;
            border-top: 1px solid #d1d1d6;
        }
        .stamp-card:hover {
            background: rgba(0, 113, 227, 0.1);
            outline: 2px solid #0071e3;
            outline-offset: -2px;
        }
        .applying-overlay {
            position: fixed;
            inset: 0;
            background: rgba(245, 245, 247, 0.85);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 10px;
            font-size: 14px;
            color: #3a3a3c;
            z-index: 999;
        }
        .error-overlay {
            position: fixed;
            inset: 0;
            background: #f5f5f7;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 16px;
            padding: 32px;
            z-index: 999;
        }
        .error-text {
            font-size: 13px;
            color: #e81123;
            white-space: pre-wrap;
            text-align: center;
            max-width: 480px;
        }
    </style>
</head>
<body>

<div class="window">
    <div class="main">
        <div class="sidebar">
            <div class="sidebar-scroll">
                <div class="sidebar-section">
                    <span class="sidebar-label">Категории</span>
                    <ul id="category-list"></ul>
                </div>
            </div>
        </div>

        <div class="container" style="gap: 10px; padding: 12px 16px;">
            <p class="picker-hint">Нажмите на штамп — он будет добавлен на последнюю страницу файла</p>
            <div class="stamps-grid" id="stamps-grid" style="flex: 1;"></div>
            <div class="picker-footer">
                <button class="action-btn" id="btn-cancel">Отмена</button>
            </div>
        </div>
    </div>
</div>

<script>
function stampDisplayName(filename) {
    return filename.replace(/\.[^.]+$/, '').replace(/_[\d.]+x[\d.]+$/, '');
}

function stampSrc(stamp) {
    const ext = stamp.name.split('.').pop().toLowerCase();
    const mime = (ext === 'jpg' || ext === 'jpeg') ? 'image/jpeg' : 'image/png';
    return `data:${mime};base64,${stamp.image}`;
}

const categoryList = document.getElementById('category-list');
const grid = document.getElementById('stamps-grid');

function loadStamps(category) {
    grid.innerHTML = '<div style="grid-column:1/-1;color:#8e8e93;font-size:13px;padding:8px 0">Загрузка…</div>';
    window.pywebview.api.get_stamps(category).then(stamps => {
        grid.innerHTML = '';
        if (stamps.length === 0) {
            grid.innerHTML = '<div style="grid-column:1/-1;color:#8e8e93;font-size:13px;padding:8px 0">Категория пуста</div>';
            return;
        }
        stamps.forEach(stamp => {
            const card = document.createElement('div');
            card.className = 'stamp-card';
            card.innerHTML = `
                <div class="stamp-preview">
                    <img src="${stampSrc(stamp)}" style="width:100%;height:100%;object-fit:contain;border-radius:6px">
                </div>
                <span class="stamp-name">${stampDisplayName(stamp.name)}</span>
            `;
            card.addEventListener('click', () => applyStamp(stamp.path));
            grid.appendChild(card);
        });
    });
}

function applyStamp(path) {
    const overlay = document.createElement('div');
    overlay.className = 'applying-overlay';
    overlay.innerHTML = '<div style="font-size:28px">⏳</div><div>Штампуется…</div>';
    document.body.appendChild(overlay);

    window.pywebview.api.apply(path).then(err => {
        if (!err) return; // window уничтожен Python-ом
        document.body.removeChild(overlay);
        showError(err);
    });
}

function showError(message) {
    const overlay = document.createElement('div');
    overlay.className = 'error-overlay';
    overlay.innerHTML = `
        <div style="font-size:32px">⚠️</div>
        <div style="font-size:15px;font-weight:600;color:#1d1d1f">Ошибка при штамповании</div>
        <div class="error-text">${message}</div>
        <button class="action-btn" onclick="window.pywebview.api.cancel()">Закрыть</button>
    `;
    document.body.appendChild(overlay);
}

document.getElementById('btn-cancel').addEventListener('click', () => {
    window.pywebview.api.cancel();
});

window.addEventListener('pywebviewready', () => {
    window.pywebview.api.get_categories().then(categories => {
        if (categories.length === 0) {
            grid.innerHTML = '<div style="grid-column:1/-1;color:#8e8e93;font-size:13px;padding:8px 0">Библиотека штампов пуста</div>';
            return;
        }
        categories.forEach((name, i) => {
            const li = document.createElement('li');
            li.textContent = name;
            li.dataset.category = name;
            li.addEventListener('click', () => {
                categoryList.querySelectorAll('li').forEach(l => l.classList.remove('active'));
                li.classList.add('active');
                loadStamps(name);
            });
            categoryList.appendChild(li);
            if (i === 0) {
                li.classList.add('active');
                loadStamps(name);
            }
        });
    });
});
</script>
</body>
</html>
